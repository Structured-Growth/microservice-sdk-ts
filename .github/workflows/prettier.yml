name: Prettier
on:
  workflow_call:
  pull_request:
    types: [ opened, reopened ]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          # Use the PR head when available, otherwise fall back to the pushed branch.
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Prettify code
        uses: creyD/prettier_action@v4.3
        with:
          # This part is also where you can pass other options, for example:
          prettier_version: 2.8.8
          prettier_options: --check src
          only_changed: True
